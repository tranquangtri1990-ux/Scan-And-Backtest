name: Claude Bot Pro

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Cache vnstock device registration
        uses: actions/cache@v4
        with:
          path: |
            ~/.vnstock
            ~/.config/vnstock
            /home/runner/.vnstock
            /home/runner/.config/vnstock
          key: vnstock-device-${{ runner.os }}
          restore-keys: |
            vnstock-device-

      - name: Install requests
        run: pip install requests

      - name: Install vnstock-cli
        run: |
          wget -q https://vnstocks.com/files/vnstock-cli-installer.run -O installer.run
          chmod +x installer.run
          ./installer.run -- --non-interactive --api-key "${{ secrets.VNSTOCK_API_KEY }}"

      - name: Install dependencies
        run: |
          uv pip install --python /home/runner/.venv/bin/python \
            pandas numpy requests "python-telegram-bot==20.7"
          /home/runner/.venv/bin/python -c "import telegram; print('telegram OK')"
          /home/runner/.venv/bin/python -c "from vnstock import Vnstock; print('vnstock OK')"

      - name: Run Claude Bot Pro
        run: /home/runner/.venv/bin/python claude_bot_pro.py
        env:
          TELEGRAM_TOKEN2:   ${{ secrets.TELEGRAM_TOKEN2 }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          VNSTOCK_API_KEY:   ${{ secrets.VNSTOCK_API_KEY }}

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude_pro_scanall
          path: claude_pro_scanall_*.csv
