name: Weekly Scan

on:
  workflow_dispatch:

jobs:
  weeklyscan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache vnstock device registration
        uses: actions/cache@v4
        with:
          path: |
            ~/.vnstock
            ~/.config/vnstock
          key: vnstock-device-${{ runner.os }}
          restore-keys: |
            vnstock-device-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests "python-telegram-bot==20.7" vnstock

      - name: Verify vnstock
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: |
          python -c "import telegram; print('telegram OK')"
          python -c "from vnstock import Vnstock; print('vnstock OK')"

      - name: Run Weekly Scan
        run: python weeklyscan.py
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ket_qua_weekly
          path: ket_qua_weekly_*.csv
